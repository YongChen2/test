<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Znacky aut | AutoMarket</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">AM</span><span>AutoMarket</span></a>
      <nav class="nav" aria-label="Hlavni navigace">
        <a href="./nabidka.html">Nabidka</a>
        <a href="./znacky.html">Znacky</a>
        <a href="./prodej.html">Prodat auto</a>
        <a href="./autobazary.html">Pro autobazary</a>
        <a href="./cenik.html">Cenik</a>
        <a href="./ucet.html">Muj ucet</a>
      </nav>
      <button class="ghost-button" id="accountButton" type="button">Prihlasit</button>
    </header>
    <main>
      <section class="page-hero">
        <p class="eyebrow">Katalog podle znacky</p>
        <h1>Znacky aut</h1>
        <p>Rychly prehled znacek a modelu, ktere jsou v ukazkove nabidce AutoMarketu.</p>
      </section>
      <section class="directory-section">
        <div class="directory-grid" id="brandDirectory"></div>
      </section>
    </main>
    <dialog class="modal" id="accountModal">
      <form method="dialog" class="modal-card" id="accountForm">
        <button class="close-button" id="closeAccount" type="button" aria-label="Zavrit">x</button>
        <p class="eyebrow">Demo ucet</p>
        <h2>Prihlaseni</h2>
        <p>Zadejte telefon a e-mail. Pro demo neni potreba heslo.</p>
        <label>Telefon <input id="loginPhone" type="tel" required placeholder="+420 777 123 456" /></label>
        <label>E-mail <input id="loginEmail" type="email" required placeholder="vas@email.cz" /></label>
        <button class="primary-button wide" type="submit">Pokracovat</button>
      </form>
    </dialog>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
